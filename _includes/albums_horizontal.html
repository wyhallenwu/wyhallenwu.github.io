<div class="card-item col">
    {%- if album.redirect -%}
    <a href="{{ album.redirect }}">
    {%- else -%}
    <a href="{{ album.url | relative_url }}">
    {%- endif -%}
      <div class="card hoverable">
        <div class="row g-0">
          {%- if album.img -%}
          <div class="card-img col-md-6">
            {% include figure.html path=album.img alt="album thumbnail" %}
          </div>
          <div class="col-md-6">
          {%- else -%}
          <div class="col-md-12">
          {%- endif -%}
            <div class="card-body">
              <h3 class="card-title text-lowercase">{{ album.title }}</h3>
              <p class="card-text">{{ album.description }}</p>
            </div>
          </div>
        </div>
      </div>
    </a>
  </div>
